services:
  mc-server:
    build:
      context: ..
      dockerfile: Base.docker
    container_name: mc-bedrock-dev
    ports:
      - "19132:19132/udp"
    # 开发环境：全读写挂载，修改Addon/配置实时生效
    volumes:
      - ./worlds:/data/worlds
      - ./addons:/data/behavior_packs
      - ./addons:/data/resource_packs
      - ./server.properties:/data/server.properties
      - ./backups:/data/backups
    # 开发环境核心配置
    environment:
      - UID=10001
      - GID=10001
      - EULA=TRUE
      - ONLINE_MODE=FALSE
      - ALLOW_CHEATS=TRUE
      - SERVER_NAME=MC開發測試服
      - MAX_PLAYERS=10
      - DIFFICULTY=creative
      - LEVEL_NAME=DevWorld
    restart: unless-stopped
    # 开发环境：简化日志，不限制资源
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
name: ready-bedrock

services:
  mc-server:
    build:
      context: .
      dockerfile: base.docker
    container_name: mc-bedrock-prod
    user: "10001:10001"
    stdin_open: true
    tty: true 
    ports:
      - "19132:19132/udp"
    volumes:
      - ./worlds:/data/worlds
      - ./server.properties:/data/server.properties
      - ./my-addons/project-1/project-1-bp:/data/development_behavior_packs/project-1-bp
      - ./my-addons/project-1/project-1-rp:/data/development_resource_packs/project-1-rp
      - ./my-addons/project-2/project-2-bp:/data/development_behavior_packs/project-2-bp
      - ./my-addons/project-2/project-2-rp:/data/development_resource_packs/project-2-rp
      - ./my-addons/project-3/project-3-bp:/data/development_behavior_packs/project-3-bp
      - ./my-addons/project-3/project-3-rp:/data/development_resource_packs/project-3-rp
      - ./my-addons/project-4/project-4-bp:/data/development_behavior_packs/project-4-bp
      - ./my-addons/project-4/project-4-rp:/data/development_resource_packs/project-4-rp
      - ./backups:/data/backups
    environment:
      - UID=10001
      - GID=10001
      - EULA=TRUE
      - ONLINE_MODE=true
      - ALLOW_CHEATS=false
      - SERVER_NAME=我的正式伺服器
      - MAX_PLAYERS=20
      - DIFFICULTY=hard
      - LEVEL_NAME=Prod_World
      - AUTO_LEVEL_CREATE=true

      # 秒啟動優化
      - VERSION=1.26.3.1
      - SKIP_DOWNLOAD_COMPARE=true
      - SKIP_BACKUP=true

      - ALLOW_LIST=false
      - OPS=2535456335660300

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'